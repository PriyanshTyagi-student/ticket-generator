<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Ticket Generator - Zonex 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 20px;
      border: 2px solid rgba(6, 182, 212, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      color: #06b6d4;
      margin-bottom: 10px;
    }

    .header p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .form-section {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #94a3b8;
      font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #06b6d4;
      background: rgba(15, 23, 42, 1);
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      background: rgba(6, 182, 212, 0.1);
      padding: 10px 15px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
    }

    .checkbox-item:hover {
      border-color: #06b6d4;
    }

    .checkbox-item input {
      width: auto;
      margin-right: 8px;
      cursor: pointer;
    }

    .btn {
      padding: 15px 30px;
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      margin-top: 20px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
    }

    .ticket-preview {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      border: 2px solid #06b6d4;
      margin-top: 30px;
      display: none;
    }

    .ticket-preview.active {
      display: block;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ticket-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .ticket-header h2 {
      font-size: 2rem;
      color: #06b6d4;
      margin-bottom: 5px;
    }

    .ticket-header p {
      color: #94a3b8;
    }

    .qr-code-container {
      text-align: center;
      margin: 30px 0;
    }

    .qr-code-container img {
      width: 200px;
      height: 200px;
      border-radius: 10px;
      border: 2px solid #06b6d4;
    }

    .registration-id {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: #06b6d4;
      letter-spacing: 3px;
      margin: 20px 0;
    }

    .ticket-details {
      background: #0f172a;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #94a3b8;
    }

    .detail-value {
      color: #fff;
      font-weight: 600;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 30px;
    }

    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid #22c55e;
      color: #22c55e;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.2);
      border: 2px solid #ef4444;
      color: #ef4444;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 4px solid rgba(6, 182, 212, 0.2);
      border-top: 4px solid #06b6d4;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .form-row,
      .action-buttons {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🎫 Offline Ticket Generator</h1>
      <p>Zonex 2026 - Manual Registration System</p>
    </div>

    <!-- Alert Messages -->
    <div id="alert" class="alert"></div>

    <!-- Registration Form -->
    <div class="form-section">
      <h2 style="margin-bottom: 25px; color: #06b6d4;">📝 Participant Details</h2>
      
      <form id="ticketForm">
        <!-- Personal Information -->
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fullName" required placeholder="Enter full name">
          </div>
          <div class="form-group">
            <label>Mobile Number *</label>
            <input type="tel" id="mobile" required placeholder="10-digit mobile number" maxlength="10">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" required placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label>City *</label>
            <input type="text" id="city" required placeholder="Enter city">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>College/Institution *</label>
            <input type="text" id="college" required placeholder="College name">
          </div>
          <div class="form-group">
            <label>Course & Year *</label>
            <input type="text" id="courseYear" required placeholder="e.g., B.Tech 2nd Year">
          </div>
        </div>

        <!-- Category Selection -->
        <div class="form-group">
          <label>Category *</label>
          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Individual">Individual</option>
            <option value="Team">Team</option>
            <option value="Visitor">Visitor</option>
          </select>
        </div>

        <!-- Activities Selection -->
        <div class="form-group" id="activitiesSection">
          <label>Activities/Skills *</label>
          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Dancing"> Dancing
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Singing"> Singing
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Ramp Walk/Modeling"> Ramp Walk/Modeling
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Stand-up Comedy"> Stand-up Comedy
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Poetry"> Poetry
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Ideathon"> Ideathon
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Marketing Idea Challenge"> Marketing Idea Challenge
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Hackathon"> Hackathon
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Debate Competition"> Debate Competition
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Quiz Competition"> Quiz Competition
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Presentation"> Presentation
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Speech"> Speech
            </label>
            <label class="checkbox-item">
              <input type="checkbox" name="activities" value="Painting/Drawing and Sketching"> Painting/Drawing and Sketching
            </label>
          </div>
        </div>

        <!-- Team Members (if Team category) -->
        <div class="form-group" id="teamMembersSection" style="display: none;">
          <label>Team Members (comma-separated)</label>
          <textarea id="teamMembers" placeholder="Enter team member names separated by commas"></textarea>
        </div>

        <!-- Pass Type -->
        <div class="form-group">
          <label>Pass Type *</label>
          <select id="passType" required>
            <option value="">Select Pass Type</option>
            <option value="Pro Participation - ₹150">Pro Participation - ₹150</option>
            <option value="Visitor Pass - ₹150">Visitor Pass - ₹150</option>
            <option value="Complimentary">Complimentary (Free)</option>
          </select>
        </div>

        <!-- Amount Paid -->
        <div class="form-row">
          <div class="form-group">
            <label>Amount Paid *</label>
            <input type="number" id="amountPaid" required placeholder="Enter amount" min="0">
          </div>
          <div class="form-group">
            <label>Payment Mode *</label>
            <select id="paymentMode" required>
              <option value="">Select Mode</option>
              <option value="Cash">Cash</option>
              <option value="UPI">UPI</option>
              <option value="Card">Card</option>
              <option value="Complimentary">Complimentary</option>
            </select>
          </div>
        </div>

        <!-- Optional Fields -->
        <div class="form-row">
          <div class="form-group">
            <label>Portfolio URL</label>
            <input type="url" id="portfolio" placeholder="https://portfolio.com">
          </div>
          <div class="form-group">
            <label>GitHub Username</label>
            <input type="text" id="github" placeholder="@username">
          </div>
        </div>

        <div class="form-group">
          <label>Instagram Handle</label>
          <input type="text" id="instagram" placeholder="@handle">
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn" id="generateBtn">
          🎟️ Generate Ticket
        </button>
      </form>
    </div>

    <!-- Ticket Preview -->
    <div id="ticketPreview" class="ticket-preview">
      <div class="ticket-header">
        <h2>ZONEX 2026</h2>
        <p>Where Talent Takes Shape</p>
      </div>

      <div class="qr-code-container">
        <img id="qrCodeImage" src="" alt="QR Code">
        <p style="margin-top: 10px; color: #94a3b8; font-size: 0.9rem;">Scan at venue entrance</p>
      </div>

      <div class="registration-id" id="registrationId">
        LOADING...
      </div>

      <div class="ticket-details" id="ticketDetails">
        <!-- Details will be populated here -->
      </div>

      <div class="action-buttons">
        <button class="btn btn-secondary" onclick="downloadTicketHTML()">
          📥 Download HTML
        </button>
        <button class="btn" onclick="sendTicketEmail()">
          📧 Send Email
        </button>
      </div>

      <div style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="resetForm()">
          ➕ Generate Another Ticket
        </button>
      </div>
    </div>
  </div>

  <script>
    // Backend URL - Update this with your backend server
    const BACKEND_URL = 'https://techmnhub-backend.onrender.com';
    
    let currentTicketData = null;

    // Test backend connection on page load
    window.addEventListener('load', async function() {
      try {
        console.log('🔍 Testing backend connection...');
        const response = await fetch(`${BACKEND_URL}/api/ticket/health`, {
          method: 'GET'
        });
        if (!response.ok) {
          throw new Error(`Health check failed with status ${response.status}`);
        }
        console.log('✅ Backend is reachable');
      } catch (error) {
        console.warn('⚠️ Backend connection test failed:', error.message);
        showAlert(`Warning: Cannot connect to backend at ${BACKEND_URL}. Start backend and open this page via http://localhost:8080 (not file://).`, 'error');
      }
    });

    // Show/hide team members section based on category
    document.getElementById('category').addEventListener('change', function() {
      const teamSection = document.getElementById('teamMembersSection');
      const activitiesSection = document.getElementById('activitiesSection');
      const activityCheckboxes = document.querySelectorAll('input[name="activities"]');
      const isVisitor = this.value === 'Visitor';

      teamSection.style.display = this.value === 'Team' ? 'block' : 'none';
      activitiesSection.style.display = isVisitor ? 'none' : 'block';

      if (isVisitor) {
        activityCheckboxes.forEach((checkbox) => {
          checkbox.checked = false;
        });
      }
    });

    // Update amount when pass type changes
    document.getElementById('passType').addEventListener('change', function() {
      const amountInput = document.getElementById('amountPaid');
      if (this.value.includes('₹150')) {
        amountInput.value = '150';
      } else if (this.value === 'Complimentary') {
        amountInput.value = '0';
      }
    });

    // Form submission
    document.getElementById('ticketForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Get form data
      const formData = {
        fullName: document.getElementById('fullName').value,
        mobile: document.getElementById('mobile').value,
        email: document.getElementById('email').value,
        city: document.getElementById('city').value,
        college: document.getElementById('college').value,
        courseYear: document.getElementById('courseYear').value,
        category: document.getElementById('category').value,
        subCategory: Array.from(document.querySelectorAll('input[name="activities"]:checked')).map(cb => cb.value),
        teamMembers: document.getElementById('teamMembers').value.split(',').map(m => m.trim()).filter(m => m),
        passName: document.getElementById('passType').value,
        amountPaid: parseInt(document.getElementById('amountPaid').value),
        paymentMode: document.getElementById('paymentMode').value,
        portfolio: document.getElementById('portfolio').value,
        github: document.getElementById('github').value,
        instagram: document.getElementById('instagram').value
      };

      // Validation
      if (formData.mobile.length !== 10) {
        showAlert('Please enter a valid 10-digit mobile number', 'error');
        return;
      }

      if (formData.category !== 'Visitor' && formData.subCategory.length === 0) {
        showAlert('Please select at least one activity', 'error');
        return;
      }

      // Show loading
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      try {
        console.log('🔄 Sending request to:', `${BACKEND_URL}/api/ticket/generate`);
        console.log('📦 Form data:', formData);
        
        // Call backend API
        const response = await fetch(`${BACKEND_URL}/api/ticket/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        console.log('📡 Response status:', response.status);
        
        const data = await response.json();
        console.log('📥 Response data:', data);

        if (!response.ok) {
          throw new Error(data.msg || 'Failed to generate ticket');
        }

        // Store ticket data
        currentTicketData = data;

        // Display ticket
        displayTicket(data);
        showAlert('Ticket generated successfully!', 'success');

      } catch (error) {
        console.error('❌ Error details:', error);
        
        // Show more specific error messages
        let errorMsg = error.message || 'Failed to generate ticket';
        
        if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {
          errorMsg = `Cannot connect to backend server at ${BACKEND_URL}. Make sure the backend is running!`;
        }
        
        showAlert(errorMsg, 'error');
        btn.disabled = false;
        btn.innerHTML = '🎟️ Generate Ticket';
      }
    });

    function displayTicket(data) {
      // Update QR Code
      document.getElementById('qrCodeImage').src = data.qrCode;
      
      // Update Registration ID
      document.getElementById('registrationId').textContent = data.registrationId;

      const activityText = data.user.subCategory && data.user.subCategory.length > 0
        ? data.user.subCategory.join(', ')
        : 'N/A';
      
      // Update Details
      const detailsHTML = `
        <div class="detail-row">
          <span class="detail-label">Name:</span>
          <span class="detail-value">${data.user.fullName}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Email:</span>
          <span class="detail-value">${data.user.email}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Mobile:</span>
          <span class="detail-value">${data.user.mobile}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">College:</span>
          <span class="detail-value">${data.user.college}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Category:</span>
          <span class="detail-value">${data.user.category}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Activities:</span>
          <span class="detail-value">${activityText}</span>
        </div>
        ${data.user.teamMembers && data.user.teamMembers.length > 0 ? `
        <div class="detail-row">
          <span class="detail-label">Team Members:</span>
          <span class="detail-value">${data.user.teamMembers.join(', ')}</span>
        </div>
        ` : ''}
        <div class="detail-row">
          <span class="detail-label">Pass Type:</span>
          <span class="detail-value">${data.user.passName}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Amount Paid:</span>
          <span class="detail-value">₹${data.user.amountPaid}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Payment Mode:</span>
          <span class="detail-value">${data.user.paymentMode}</span>
        </div>
      `;
      
      document.getElementById('ticketDetails').innerHTML = detailsHTML;
      
      // Show ticket preview
      document.getElementById('ticketPreview').classList.add('active');
      
      // Scroll to ticket
      document.getElementById('ticketPreview').scrollIntoView({ behavior: 'smooth' });
    }

    function downloadTicketHTML() {
      if (!currentTicketData) return;
      
      const data = currentTicketData.user;
      const qrCode = currentTicketData.qrCode;
      const regId = currentTicketData.registrationId;
      const activityText = data.subCategory && data.subCategory.length > 0
        ? data.subCategory.join(', ')
        : 'N/A';
      
      const ticketHTML = `
<!DOCTYPE html>
<html>
<head>
  <title>Zonex 2026 - Ticket - ${regId}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
    .ticket { max-width: 500px; background: #1e293b; border-radius: 20px; padding: 30px; border: 2px solid #06b6d4; }
    .header { text-align: center; margin-bottom: 30px; }
    .title { font-size: 36px; font-weight: bold; color: #06b6d4; margin: 0; }
    .subtitle { color: #94a3b8; }
    .qr-code { text-align: center; margin: 20px 0; }
    .qr-code img { width: 200px; height: 200px; border-radius: 10px; border: 2px solid #06b6d4; }
    .details { background: #0f172a; padding: 20px; border-radius: 10px; }
    .detail-row { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .detail-row:last-child { border-bottom: none; }
    .label { color: #94a3b8; }
    .value { color: white; font-weight: bold; }
    .registration-id { font-size: 24px; color: #06b6d4; text-align: center; letter-spacing: 2px; margin: 20px 0; font-weight: bold; }
    .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 12px; }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="header">
      <h1 class="title">ZONEX 2026</h1>
      <p class="subtitle">Where Talent Takes Shape</p>
    </div>
    
    <div class="qr-code">
      <img src="${qrCode}" alt="QR Code" />
    </div>
    
    <div class="registration-id">${regId}</div>
    
    <div class="details">
      <div class="detail-row">
        <span class="label">Name:</span>
        <span class="value">${data.fullName}</span>
      </div>
      <div class="detail-row">
        <span class="label">Email:</span>
        <span class="value">${data.email}</span>
      </div>
      <div class="detail-row">
        <span class="label">Mobile:</span>
        <span class="value">${data.mobile}</span>
      </div>
      <div class="detail-row">
        <span class="label">College:</span>
        <span class="value">${data.college}</span>
      </div>
      <div class="detail-row">
        <span class="label">Category:</span>
        <span class="value">${data.category}</span>
      </div>
      <div class="detail-row">
        <span class="label">Activities:</span>
        <span class="value">${activityText}</span>
      </div>
      ${data.teamMembers && data.teamMembers.length > 0 ? `
      <div class="detail-row">
        <span class="label">Team:</span>
        <span class="value">${data.teamMembers.join(', ')}</span>
      </div>
      ` : ''}
      <div class="detail-row">
        <span class="label">Pass Type:</span>
        <span class="value">${data.passName}</span>
      </div>
      <div class="detail-row">
        <span class="label">Amount Paid:</span>
        <span class="value">₹${data.amountPaid}</span>
      </div>
    </div>
    
    <div class="footer">
      <p>📅 7 March 2026 | 📍 MUZAFFARNAGAR</p>
      <p>Show this QR code at the venue for entry</p>
      <p>© 2026 TechMNHub. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
      `;
      
      const blob = new Blob([ticketHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Zonex2026_${regId}.html`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showAlert('Ticket downloaded successfully!', 'success');
    }

    async function sendTicketEmail() {
      if (!currentTicketData) return;
      
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      
      try {
        const response = await fetch(`${BACKEND_URL}/api/ticket/send-email`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            userId: currentTicketData.user._id
          })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.msg || 'Failed to send email');
        }
        
        showAlert('Email sent successfully!', 'success');
      } catch (error) {
        console.error('Error:', error);
        showAlert(error.message || 'Failed to send email', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '📧 Send Email';
      }
    }

    function resetForm() {
      document.getElementById('ticketForm').reset();
      document.getElementById('ticketPreview').classList.remove('active');
      document.getElementById('teamMembersSection').style.display = 'none';
      document.getElementById('activitiesSection').style.display = 'block';
      currentTicketData = null;
      document.getElementById('generateBtn').disabled = false;
      document.getElementById('generateBtn').innerHTML = '🎟️ Generate Ticket';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type} active`;
      
      setTimeout(() => {
        alert.classList.remove('active');
      }, 5000);
    }
  </script>
</body>
</html>
