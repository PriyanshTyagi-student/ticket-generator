<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Connection Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0f172a;
      color: #fff;
    }
    h1 {
      color: #06b6d4;
    }
    .test-section {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      border: 2px solid rgba(6, 182, 212, 0.3);
    }
    .status {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }
    .success {
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid #22c55e;
      color: #22c55e;
    }
    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 2px solid #ef4444;
      color: #ef4444;
    }
    .info {
      background: rgba(6, 182, 212, 0.2);
      border: 2px solid #06b6d4;
      color: #06b6d4;
    }
    button {
      background: #06b6d4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #0891b2;
    }
    pre {
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      color: #94a3b8;
    }
    input {
      width: 100%;
      padding: 10px;
      background: #0f172a;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🔧 Backend Connection Tester</h1>
  
  <div class="test-section">
    <h3>Configuration</h3>
    <label>Backend URL:</label>
    <input type="text" id="backendUrl" value="http://localhost:5000">
    <button onclick="testConnection()">Test Connection</button>
  </div>

  <div class="test-section">
    <h3>Connection Status</h3>
    <div id="connectionStatus"></div>
  </div>

  <div class="test-section">
    <h3>Test Ticket Generation</h3>
    <button onclick="testTicketGeneration()">Generate Test Ticket</button>
    <div id="ticketStatus"></div>
  </div>

  <div class="test-section">
    <h3>Logs</h3>
    <pre id="logs">Waiting for tests...</pre>
  </div>

  <script>
    function log(message, type = 'info') {
      const logsDiv = document.getElementById('logs');
      const timestamp = new Date().toLocaleTimeString();
      logsDiv.innerHTML += `\n[${timestamp}] ${type.toUpperCase()}: ${message}`;
      logsDiv.scrollTop = logsDiv.scrollHeight;
      console.log(message);
    }

    async function testConnection() {
      const backendUrl = document.getElementById('backendUrl').value;
      const statusDiv = document.getElementById('connectionStatus');
      
      statusDiv.innerHTML = '<div class="info">Testing connection...</div>';
      log(`Testing connection to ${backendUrl}`);

      try {
        // Test 1: API health endpoint
        log('Test 1: Checking API health endpoint');
        const healthRes = await fetch(`${backendUrl}/api/ticket/health`, { method: 'GET' });
        const healthData = await healthRes.json();
        log(`Health response (${healthRes.status}): ${JSON.stringify(healthData)}`);

        if (!healthRes.ok) {
          throw new Error(`Health check failed with status ${healthRes.status}`);
        }

        // Test 2: Check if generation route exists
        log('Test 2: Checking ticket generation endpoint validation');
        const routeTest = await fetch(`${backendUrl}/api/ticket/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({}) // Empty body to trigger validation error
        });
        
        const routeData = await routeTest.json();
        log(`Validation response (${routeTest.status}): ${JSON.stringify(routeData)}`);
        
        if (routeTest.status === 400) {
          statusDiv.innerHTML = '<div class="success">✅ Backend is running and route exists! (Validation error is expected)</div>';
          log('SUCCESS: Backend is properly configured');
        } else {
          statusDiv.innerHTML = `<div class="info">Backend responded with status: ${routeTest.status}</div>`;
        }

      } catch (error) {
        log(`ERROR: ${error.message}`, 'error');
        
        if (error.message.includes('Failed to fetch')) {
          statusDiv.innerHTML = `<div class="error">❌ Cannot connect to backend at ${backendUrl}<br><br>
            Possible issues:<br>
            1. Backend server is not running<br>
            2. Wrong URL (check port number)<br>
            3. CORS is not enabled<br>
            4. Firewall blocking connection</div>`;
        } else {
          statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
        }
      }
    }

    async function testTicketGeneration() {
      const backendUrl = document.getElementById('backendUrl').value;
      const statusDiv = document.getElementById('ticketStatus');
      
      statusDiv.innerHTML = '<div class="info">Generating test ticket...</div>';
      log('Generating test ticket with sample data');

      const testData = {
        fullName: "Test Participant",
        mobile: "9876543210",
        email: `test_${Date.now()}@example.com`,
        city: "Muzaffarnagar",
        college: "Test College",
        courseYear: "B.Tech 2nd Year",
        category: "Individual",
        subCategory: ["Coding"],
        teamMembers: [],
        passName: "Pro Participation - ₹150",
        amountPaid: 150,
        paymentMode: "Cash",
        portfolio: "",
        github: "",
        instagram: ""
      };

      log(`Test data: ${JSON.stringify(testData, null, 2)}`);

      try {
        const response = await fetch(`${backendUrl}/api/ticket/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(testData)
        });

        const data = await response.json();
        log(`Response (${response.status}): ${JSON.stringify(data, null, 2)}`);

        if (response.ok) {
          statusDiv.innerHTML = `<div class="success">✅ Ticket Generated Successfully!<br>
            Registration ID: <strong>${data.registrationId}</strong><br>
            <img src="${data.qrCode}" style="width: 150px; margin-top: 10px; border-radius: 8px;">
          </div>`;
          log('SUCCESS: Ticket generated successfully!');
        } else {
          statusDiv.innerHTML = `<div class="error">❌ ${data.msg || 'Failed to generate ticket'}</div>`;
          log(`FAILED: ${data.msg}`, 'error');
        }

      } catch (error) {
        log(`ERROR: ${error.message}`, 'error');
        statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}<br><br>
          Make sure backend server is running!</div>`;
      }
    }

    // Auto-test on load
    window.addEventListener('load', () => {
      log('Backend Connection Tester loaded');
      log('Click "Test Connection" to verify backend is running');
    });
  </script>
</body>
</html>
